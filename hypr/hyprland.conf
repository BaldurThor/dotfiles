# ============================================================
#  hyprland.conf
#  Stack: Hyprland + KDE apps + Ghostty
#  Feel: COSMIC shortcuts, dwindle tiling, dynamic workspaces
# ============================================================


# ------------------------------------------------------------
#  MONITORS
#  Replace with your actual monitor name (hyprctl monitors)
#  Format: monitor=name,resolution@hz,position,scale
# ------------------------------------------------------------

monitorv2 {
    output = eDP-1
    mode = 1920x1080@165
    position = 0x0
    scale = 1
  }

# ------------------------------------------------------------
#  AUTOSTART
# ------------------------------------------------------------
exec-once = waybar
exec-once = dunst
exec-once = hypridle
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP


# ------------------------------------------------------------
#  ENVIRONMENT VARIABLES
# ------------------------------------------------------------
env = XCURSOR_THEME,breeze_cursors
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,kde
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland


# ------------------------------------------------------------
#  INPUT
# ------------------------------------------------------------
input {
    kb_layout = us          # Change to your layout e.g. is, gb, de
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
    }
}


# ------------------------------------------------------------
#  GENERAL
# ------------------------------------------------------------
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(5b6abfff) rgba(7c8ef0ff) 45deg
    col.inactive_border = rgba(3a3a4aaa)
    layout = dwindle
    resize_on_border = true
}


# ------------------------------------------------------------
#  DECORATION
# ------------------------------------------------------------
decoration {
    rounding = 8

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(00000055)
    }
}


# ------------------------------------------------------------
#  ANIMATIONS
#  Vertical workspace slide to match COSMIC feel
# ------------------------------------------------------------
animations {
    enabled = true

    bezier = snap,  0.25, 0.1, 0.25, 1.0
    bezier = slide, 0.4,  0.0, 0.2,  1.0
    bezier = pop,   0.1,  0.9, 0.2,  1.0

    animation = windows,     1, 3, pop,   popin 80%
    animation = windowsOut,  1, 2, snap,  popin 80%
    animation = border,      1, 5, snap
    animation = fade,        1, 3, snap
    animation = workspaces,  1, 3, slide, slidevert
}


# ------------------------------------------------------------
#  DWINDLE LAYOUT
# ------------------------------------------------------------
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}


# ------------------------------------------------------------
#  MISC
# ------------------------------------------------------------
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
}


# ------------------------------------------------------------
#  DYNAMIC WORKSPACES
#  3 persistent base workspaces, more created on demand
# ------------------------------------------------------------
workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true


# ------------------------------------------------------------
#  WINDOW RULES
# ------------------------------------------------------------

# File dialogs always float
windowrule = match:title ^(Open File), float on
windowrule = match:title ^(Select a File), float on
windowrule = match:title ^(Choose wallpaper), float on
windowrule = match:title ^(Open Folder), float on
windowrule = match:title ^(Save As), float on
windowrule = match:class ^(xdg-desktop-portal), float on
windowrule = match:class ^(xdg-desktop-portal-kde), float on
 
# Dolphin progress dialogs float
windowrule = match:class ^(dolphin), match:title ^(Copying|Moving|Deleting), float on
 
# Sensible size for portal dialogs
windowrule = match:class ^(xdg-desktop-portal-kde), size 900 600

# ------------------------------------------------------------
#  KEYBINDS — COSMIC defaults (source: System76 official docs)
#
#  Launcher:        Super
#  Navigate wins:   Super + arrows
#  Switch wins:     Super + Tab / Super + Shift + Tab
#  Nav workspaces:  Super + Ctrl + arrows
#  Switch ws:       Super + 1-9
#  Move window:     Super + Shift + arrows
#  Move to ws:      Super + Shift + 1-9
#  Close:           Super + Q
#  Maximise:        Super + M
#  Fullscreen:      Super + F11
#  Toggle float:    Super + G
#  Toggle tiling:   Super + Y  (current workspace)
#  Change orient:   Super + O
#  Terminal:        Super + T
#  Files:           Super + F
#  Lock:            Super + Escape
#  Log out:         Super + Shift + Escape
#  Screenshot:      Print
# ------------------------------------------------------------
$mod = SUPER

# --- Session ---
bind = $mod SHIFT, Escape, exit,
bind = $mod,       Escape, exec, hyprlock

# --- Apps ---
bind = $mod, T, exec, ghostty               # COSMIC: Super+T
bind = $mod, F, exec, dolphin               # COSMIC: Super+F (Files)
bind = $mod, Super_L, exec, wofi --show drun  # COSMIC: Super alone = launcher

# --- Window management ---
bind = $mod, Q,   killactive,               # COSMIC: Super+Q
bind = $mod, M,   fullscreen, 1             # COSMIC: Super+M (maximise)
bind = $mod, F11, fullscreen, 0             # COSMIC: Super+F11 (true fullscreen)
bind = $mod, G,   togglefloating,           # COSMIC: Super+G (toggle float)
bind = $mod, Y,   togglefloating,           # COSMIC: Super+Y (toggle tiling for workspace)
bind = $mod, O,   layoutmsg, togglesplit    # COSMIC: Super+O (change orientation)

# --- Navigate between windows (COSMIC: Super+arrows) ---
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Vim equivalents
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# --- Switch between windows (COSMIC: Super+Tab) ---
bind = $mod,       Tab, cyclenext,
bind = $mod SHIFT, Tab, cyclenext, prev

# --- Navigate between workspaces (COSMIC: Super+Ctrl+arrows) ---
bind = $mod CTRL, left,  workspace, e-1
bind = $mod CTRL, right, workspace, e+1
bind = $mod CTRL, up,    workspace, e-1
bind = $mod CTRL, down,  workspace, e+1

# --- Switch to workspace by number (COSMIC: Super+1-9) ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, e+1             # COSMIC: Super+0 = last workspace

# --- Move window to workspace (COSMIC: Super+Shift+1-9) ---
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, e+1 # COSMIC: Super+Shift+0 = last workspace

# --- Move windows (COSMIC: Super+Shift+arrows) ---
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Vim equivalents
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# --- Resize mode (COSMIC: Super+R, then arrows) ---
bind = $mod, R, submap, resize
submap = resize
binde = , right, resizeactive,  40  0
binde = , left,  resizeactive, -40  0
binde = , up,    resizeactive,  0  -40
binde = , down,  resizeactive,  0   40
binde = , L,     resizeactive,  40  0
binde = , H,     resizeactive, -40  0
binde = , K,     resizeactive,  0  -40
binde = , J,     resizeactive,  0   40
bind  = , Escape, submap, reset
bind  = , Return, submap, reset
submap = reset

# --- Mouse window control ---
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# --- Screenshots (COSMIC: Print) ---
bind = ,      Print, exec, spectacle -f     # Full screen
bind = $mod,  Print, exec, spectacle -r     # Region
bind = SHIFT, Print, exec, spectacle -a     # Active window

# --- Media keys ---
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
